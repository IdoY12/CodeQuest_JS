openapi: 3.0.3
info:
  title: CodeQuest API
  version: 1.0.0
  description: Authoritative HTTP contract for backend routes under /api.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Learning
  - name: CodePuzzles
paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Service health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok: { type: boolean, description: Health status, example: true }
                  service: { type: string, description: Service name, example: codequest-backend }
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string, description: Refresh JWT }
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                type: object
                required: [accessToken]
                properties:
                  accessToken: { type: string, description: New access JWT }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthMeResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke session family
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string, description: Optional refresh JWT }
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, description: Success flag, example: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /user/profile:
    get:
      tags: [User]
      summary: Get full profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfileResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [User]
      summary: Update username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string, minLength: 2, maxLength: 30, description: New username }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [id, username, avatarUrl]
                properties:
                  id: { type: string, description: User id }
                  username: { type: string, description: Username }
                  avatarUrl: { type: string, nullable: true, format: uri, description: Avatar URL }
        "400": { $ref: "#/components/responses/BadRequest" }
  /user/avatar:
    patch:
      tags: [User]
      summary: Save avatar URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatarUrl]
              properties:
                avatarUrl: { type: string, format: uri, description: Avatar URL in configured bucket }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
                required: [avatarUrl]
                properties:
                  avatarUrl: { type: string, format: uri, description: Persisted avatar URL }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /user/progress-summary:
    get:
      tags: [User]
      summary: Get dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProgressSummary" }
        "500": { $ref: "#/components/responses/InternalError" }
  /user/onboarding:
    post:
      tags: [User]
      summary: Submit onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardingRequest" }
      responses:
        "200":
          description: Onboarding result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OnboardingResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /user/preferences:
    get:
      tags: [User]
      summary: Get preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferencesGetResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [User]
      summary: Update preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserPreferencesPatchRequest" }
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferencesPatchResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /user/practice-log:
    post:
      tags: [User]
      summary: Append practiced seconds for date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dateKey, practicedSeconds]
              properties:
                dateKey: { type: string, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$", description: Date key (YYYY-MM-DD) }
                practicedSeconds: { type: integer, minimum: 1, maximum: 3600, description: Seconds practiced }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [practicedSeconds]
                properties:
                  practicedSeconds: { type: integer, description: Total seconds for the date }
        "400": { $ref: "#/components/responses/BadRequest" }
  /user/daily-goal-status/{dateKey}:
    get:
      tags: [User]
      summary: Daily goal status for date
      parameters:
        - in: path
          name: dateKey
          required: true
          schema: { type: string, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
          description: Date key (YYYY-MM-DD)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DailyGoalStatus" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /user/daily-goal-status/{dateKey}/mark-notified:
    post:
      tags: [User]
      summary: Mark reminder as sent
      parameters:
        - in: path
          name: dateKey
          required: true
          schema: { type: string, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
          description: Date key (YYYY-MM-DD)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [INCOMPLETE, COMPLETE], description: Reminder type }
      responses:
        "200":
          description: Updated reminder state
          content:
            application/json:
              schema:
                type: object
                required: [dateKey, incompleteReminderCount, completeReminderSent]
                properties:
                  dateKey: { type: string, description: Date key }
                  incompleteReminderCount: { type: integer, description: Count of incomplete reminders }
                  completeReminderSent: { type: boolean, description: Whether complete reminder was sent }
        "400": { $ref: "#/components/responses/BadRequest" }
  /user/change-password:
    post:
      tags: [User]
      summary: Change account password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, minLength: 6, description: Current password }
                newPassword: { type: string, minLength: 6, description: New password }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, description: Success flag, example: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /user/account:
    delete:
      tags: [User]
      summary: Delete account permanently
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation: { type: string, enum: [DELETE], description: Must be literal DELETE }
      responses:
        "204": { description: Deleted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /learning/exercises/{experienceLevel}:
    get:
      tags: [Learning]
      summary: List exercises for an experience level
      parameters:
        - in: path
          name: experienceLevel
          required: true
          schema: { $ref: "#/components/schemas/ExperienceLevel" }
          description: Curriculum track (JUNIOR, MID, or SENIOR)
      responses:
        "200":
          description: Exercises ordered by orderIndex
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExerciseClientDto" }
        "500": { $ref: "#/components/responses/InternalError" }
  /learning/submit-exercise:
    post:
      tags: [Learning]
      summary: Submit lesson exercise answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [exerciseId, answer]
              properties:
                exerciseId: { type: string, minLength: 3, description: Exercise id }
                answer: { type: string, description: Submitted answer }
                timeTakenMs: { type: integer, minimum: 1, default: 1000, description: Time taken in milliseconds }
                attempts: { type: integer, minimum: 1, default: 1, description: Number of attempts }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExerciseSubmitResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /learning/resume:
    get:
      tags: [Learning]
      summary: Resume position for a curriculum track
      parameters:
        - in: query
          name: experienceLevel
          required: false
          schema: { $ref: "#/components/schemas/ExperienceLevel" }
          description: When omitted, uses the user's active experience level
      responses:
        "200":
          description: Next exercise index for the requested or active level
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProgressResume" }
        "500": { $ref: "#/components/responses/InternalError" }
  /code-puzzles/all:
    get:
      tags: [CodePuzzles]
      security: []
      summary: Get all code puzzles sorted by orderIndex
      responses:
        "200":
          description: Array of all puzzles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CodePuzzleClient" }
        "500": { $ref: "#/components/responses/InternalError" }
  /code-puzzles/{id}/submit:
    post:
      tags: [CodePuzzles]
      security: []
      summary: Submit an answer for a puzzle
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
          description: Puzzle database id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer: { type: string, description: Submitted one-line JS expression }
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                type: object
                required: [correct]
                properties:
                  correct: { type: boolean, description: Whether the answer matched accepted answers }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    Unauthorized:
      description: Unauthorized
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    Conflict:
      description: Conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    ServiceUnavailable:
      description: Service unavailable
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    InternalError:
      description: Internal server error
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
  schemas:
    ErrorResponse:
      type: object
      description: Generic error payload
      required: [error]
      properties:
        error:
          oneOf:
            - type: string
            - type: object
          description: Error message or flattened validator errors
    Goal:
      type: string
      description: User goal category
      enum: [JOB, WORK, FUN, PROJECT]
      example: FUN
    ExperienceLevel:
      type: string
      description: User self-reported experience level
      enum: [JUNIOR, MID, SENIOR]
      example: JUNIOR
    Difficulty:
      type: string
      description: Exercise difficulty enum from Prisma
      enum: [JUNIOR, MID, SENIOR]
      example: JUNIOR
    PathType:
      type: string
      description: Learning path key aligned with experience level
      enum: [JUNIOR, MID, SENIOR]
      example: JUNIOR
    ExerciseType:
      type: string
      description: Exercise type enum from Prisma
      enum: [CONCEPT_CARD, MULTIPLE_CHOICE, FIND_THE_BUG, DRAG_DROP, CODE_FILL, TAP_TOKEN]
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email: { type: string, format: email, description: User email }
        username: { type: string, minLength: 2, description: Username }
        password: { type: string, minLength: 6, description: Raw password }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, description: User email }
        password: { type: string, minLength: 6, description: Raw password }
    AuthMeResponse:
      type: object
      required: [id, email, username, avatarId, avatarUrl, tokenVersion]
      properties:
        id: { type: string, description: User id }
        email: { type: string, format: email, description: User email }
        username: { type: string, description: Username }
        avatarId: { type: string, description: Avatar id }
        avatarUrl: { type: string, nullable: true, format: uri, description: Avatar URL }
        tokenVersion: { type: integer, description: Current token version }
    AuthUser:
      type: object
      required: [id, email, username, avatarId, avatarUrl, onboardingCompleted, pathKey, goal, experienceLevel, dailyCommitmentMinutes, notificationsEnabled]
      properties:
        id: { type: string, description: User id }
        email: { type: string, format: email, description: User email }
        username: { type: string, description: Username }
        avatarId: { type: string, description: Avatar id }
        avatarUrl: { type: string, nullable: true, format: uri, description: Avatar URL }
        onboardingCompleted: { type: boolean, description: Onboarding completion status }
        pathKey: { $ref: "#/components/schemas/PathType" }
        goal: { allOf: [{ $ref: "#/components/schemas/Goal" }], nullable: true, description: Goal selection }
        experienceLevel: { allOf: [{ $ref: "#/components/schemas/ExperienceLevel" }], nullable: true, description: Experience level }
        dailyCommitmentMinutes: { type: integer, nullable: true, description: Daily commitment minutes }
        notificationsEnabled: { type: boolean, nullable: true, description: Notification preference }
    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user: { $ref: "#/components/schemas/AuthUser" }
        accessToken: { type: string, description: JWT access token }
        refreshToken: { type: string, description: JWT refresh token }
    UserProfileProgress:
      type: object
      required: [goal, experienceLevel, dailyCommitmentMinutes, notificationsEnabled, onboardingCompleted, currentExerciseIndex, pathKey]
      properties:
        goal: { allOf: [{ $ref: "#/components/schemas/Goal" }], nullable: true, description: Goal selection }
        experienceLevel: { allOf: [{ $ref: "#/components/schemas/ExperienceLevel" }], nullable: true, description: Experience selection }
        dailyCommitmentMinutes: { type: integer, nullable: true, description: Daily minutes }
        notificationsEnabled: { type: boolean, description: Notifications enabled }
        onboardingCompleted: { type: boolean, description: Onboarding status }
        currentExerciseIndex: { type: integer, description: Next exercise index in ordered curriculum for this level }
        pathKey: { $ref: "#/components/schemas/PathType" }
    UserProfileDuelRating:
      type: object
      required: [rating, wins, losses]
      properties:
        rating: { type: integer, description: Duel rating }
        wins: { type: integer, description: Duel wins }
        losses: { type: integer, description: Duel losses }
    UserProfileResponse:
      type: object
      required: [id, email, username, avatarUrl, createdAt, activeExperienceLevel]
      properties:
        id: { type: string, description: User id }
        email: { type: string, format: email, description: User email }
        username: { type: string, description: Username }
        avatarUrl: { type: string, nullable: true, format: uri, description: Avatar URL }
        createdAt: { type: string, format: date-time, description: Created timestamp }
        activeExperienceLevel: { allOf: [{ $ref: "#/components/schemas/ExperienceLevel" }], nullable: true, description: Active curriculum band }
        progress: { allOf: [{ $ref: "#/components/schemas/UserProfileProgress" }], nullable: true, description: User progress snapshot }
        duelRating: { allOf: [{ $ref: "#/components/schemas/UserProfileDuelRating" }], nullable: true, description: Duel rating snapshot }
    ProgressSummary:
      type: object
      required: [xpTotal, level, streakCurrent, streakDays, lessonsCompleted, duelWins, duelLosses, duelRating]
      properties:
        xpTotal: { type: integer, description: Total XP }
        level: { type: integer, description: Current level }
        streakCurrent: { type: integer, description: Current streak in days }
        streakDays: { type: array, items: { type: boolean }, description: Last 7 calendar days, practice activity flags }
        lessonsCompleted: { type: integer, description: Current exercise index (resume position) for active level }
        duelWins: { type: integer, description: Duel wins }
        duelLosses: { type: integer, description: Duel losses }
        duelRating: { type: integer, description: Duel rating }
    OnboardingRequest:
      type: object
      required: [goal, experienceLevel, dailyCommitmentMinutes]
      properties:
        goal: { $ref: "#/components/schemas/Goal" }
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        dailyCommitmentMinutes: { type: integer, minimum: 10, maximum: 60, description: Daily commitment minutes }
    OnboardingResponse:
      type: object
      required: [onboardingCompleted, pathKey, goal, experienceLevel, dailyCommitmentMinutes, notificationsEnabled]
      properties:
        onboardingCompleted: { type: boolean, description: Completion status }
        pathKey: { $ref: "#/components/schemas/PathType" }
        goal: { $ref: "#/components/schemas/Goal" }
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        dailyCommitmentMinutes: { type: integer, description: Daily commitment minutes }
        notificationsEnabled: { type: boolean, description: Notification preference }
    UserPreferencesGetResponse:
      type: object
      required: [hasCompletedOnboarding, userGoal, userLevel, dailyGoalMinutes, notificationsEnabled, pathKey]
      properties:
        hasCompletedOnboarding: { type: boolean, description: Onboarding completion status }
        userGoal: { allOf: [{ $ref: "#/components/schemas/Goal" }], nullable: true, description: Goal }
        userLevel: { allOf: [{ $ref: "#/components/schemas/ExperienceLevel" }], nullable: true, description: Level }
        dailyGoalMinutes: { type: integer, nullable: true, description: Daily goal in minutes }
        notificationsEnabled: { type: boolean, description: Notification preference }
        pathKey: { $ref: "#/components/schemas/PathType" }
    UserPreferencesPatchRequest:
      type: object
      required: [goal, experienceLevel, dailyCommitmentMinutes, notificationsEnabled]
      properties:
        goal: { $ref: "#/components/schemas/Goal" }
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        dailyCommitmentMinutes: { type: integer, enum: [10, 15, 25], description: Allowed daily minute options }
        notificationsEnabled: { type: boolean, description: Notification preference }
    UserPreferencesPatchResponse:
      type: object
      required: [hasCompletedOnboarding, goal, experienceLevel, dailyCommitmentMinutes, notificationsEnabled, pathKey]
      properties:
        hasCompletedOnboarding: { type: boolean, description: Onboarding completion status }
        goal: { $ref: "#/components/schemas/Goal" }
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        dailyCommitmentMinutes: { type: integer, description: Daily commitment minutes }
        notificationsEnabled: { type: boolean, description: Notification preference }
        pathKey: { $ref: "#/components/schemas/PathType" }
    DailyGoalStatus:
      type: object
      required: [dateKey, goalMinutes, practicedMinutes, remainingMinutes, notificationsEnabled, canSendIncomplete, canSendComplete]
      properties:
        dateKey: { type: string, description: Date key }
        goalMinutes: { type: integer, description: Daily goal in minutes }
        practicedMinutes: { type: integer, description: Practiced minutes }
        remainingMinutes: { type: integer, description: Remaining minutes }
        notificationsEnabled: { type: boolean, description: Notifications enabled }
        canSendIncomplete: { type: boolean, description: Incomplete reminder eligibility }
        canSendComplete: { type: boolean, description: Complete reminder eligibility }
    ExerciseOptionClient:
      type: object
      required: [id, text]
      properties:
        id: { type: string, description: Option id }
        text: { type: string, description: Option text }
    ExerciseClientDto:
      type: object
      required: [id, experienceLevel, orderIndex, type, prompt, codeSnippet, xpReward, options]
      properties:
        id: { type: string, description: Exercise id }
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        sectionLabel: { type: string, nullable: true, description: Optional section heading in curriculum }
        type: { $ref: "#/components/schemas/ExerciseType" }
        prompt: { type: string, description: Prompt text }
        codeSnippet: { type: string, description: Code snippet }
        orderIndex: { type: integer, description: Sort order within level }
        xpReward: { type: integer, description: XP reward }
        options: { type: array, items: { $ref: "#/components/schemas/ExerciseOptionClient" } }
    ExerciseSubmitResult:
      oneOf:
        - type: object
          required: [isCorrect, xpEarned, correctAnswer, explanation]
          properties:
            isCorrect: { type: boolean, enum: [true], description: Correct submission marker }
            xpEarned: { type: integer, description: Earned XP }
            correctAnswer: { type: string, description: Correct answer value }
            explanation: { type: string, description: Explanation text }
        - type: object
          required: [isCorrect, xpEarned]
          properties:
            isCorrect: { type: boolean, enum: [false], description: Incorrect submission marker }
            xpEarned: { type: integer, enum: [0], description: Always zero when incorrect }
    UserProgressResume:
      type: object
      description: Learning resume payload for one experience level
      required: [experienceLevel, currentExerciseIndex]
      properties:
        experienceLevel: { $ref: "#/components/schemas/ExperienceLevel" }
        currentExerciseIndex: { type: integer, description: Index of next exercise in ordered list for this level }
    CodePuzzleClient:
