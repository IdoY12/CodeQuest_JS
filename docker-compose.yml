services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codequest_js
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codequest_js"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:3.8.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - ACTIVATE_PRO=0
    volumes:
      - ./infra/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_CONFIG_ENV=compose
      - PORT=4000
      - HOST=0.0.0.0
      - JWT_ACCESS_SECRET=change-me
      - JWT_REFRESH_SECRET=change-me-too
      - CORS_ORIGIN=*
      - IO_CORS_ORIGIN=*
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(r)=>{r.resume();process.exit(r.statusCode===200?0:1);}).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  io:
    build:
      context: .
      dockerfile: io/Dockerfile
    environment:
      - NODE_CONFIG_ENV=compose
      - PORT=4001
      - HOST=0.0.0.0
      - JWT_ACCESS_SECRET=change-me
      - IO_CORS_ORIGIN=*
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4001/health',(r)=>{r.resume();process.exit(r.statusCode===200?0:1);}).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
